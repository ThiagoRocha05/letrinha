<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6B6B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Letrinha">
<title>Letrinha 🌟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --coral:    #FF6B6B;
    --yellow:   #FFE66D;
    --teal:     #4ECDC4;
    --purple:   #A855F7;
    --blue:     #60A5FA;
    --green:    #4ADE80;
    --orange:   #FB923C;
    --pink:     #F472B6;
    --dark:     #1E1B4B;
    --card:     #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--dark);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Animated background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.25;
    animation: blobFloat 8s ease-in-out infinite;
    pointer-events: none;
  }
  .blob1 { width: 400px; height: 400px; background: var(--coral);  top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 300px; height: 300px; background: var(--teal);   bottom: -80px; right: -80px; animation-delay: -3s; }
  .blob3 { width: 250px; height: 250px; background: var(--purple); top: 40%; left: 50%; animation-delay: -5s; }
  @keyframes blobFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(30px,-20px) scale(1.05); }
    66%      { transform: translate(-20px,30px) scale(0.95); }
  }

  /* Stars bg */
  .star-field {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden;
  }
  .star {
    position: absolute;
    width: 4px; height: 4px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(1); }
    50%      { opacity: 0.7; transform: scale(1.5); }
  }

  /* ====== SCREENS ====== */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    transition: opacity 0.4s, transform 0.4s;
    z-index: 10;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

  /* ====== HOME SCREEN ====== */
  #home {
    gap: 24px;
  }
  .logo-wrap {
    text-align: center;
    animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both;
  }
  .logo-emoji { font-size: clamp(80px, 18vw, 130px); display: block; animation: wiggle 2s ease-in-out infinite; }
  @keyframes wiggle {
    0%,100% { transform: rotate(-5deg) scale(1); }
    50%      { transform: rotate(5deg) scale(1.05); }
  }
  .logo-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(52px, 14vw, 96px);
    background: linear-gradient(135deg, var(--yellow), var(--coral), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(255,107,107,0.4));
  }
  .logo-sub {
    color: rgba(255,255,255,0.7);
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 700;
    margin-top: 4px;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5) rotate(-10deg); }
    to   { opacity: 1; transform: scale(1) rotate(0); }
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--yellow), var(--orange));
    color: var(--dark);
    font-family: 'Fredoka One', cursive;
    font-size: clamp(24px, 6vw, 36px);
    padding: 18px 60px;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 8px 0 rgba(0,0,0,0.3), 0 12px 30px rgba(255,140,0,0.4);
    transform: translateY(0);
    transition: all 0.1s;
    animation: popIn 0.6s 0.3s cubic-bezier(.34,1.56,.64,1) both;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
    border-radius: inherit;
  }
  .btn-primary:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 6px 15px rgba(255,140,0,0.4);
  }

  .phase-select {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
    animation: popIn 0.6s 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .phase-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(14px, 3.5vw, 18px);
    padding: 10px 20px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .phase-btn:hover, .phase-btn.active {
    background: rgba(255,255,255,0.2);
    border-color: var(--yellow);
    color: var(--yellow);
    transform: scale(1.05);
  }

  /* ====== GAME SCREEN ====== */
  #game { gap: 0; padding: 0; justify-content: flex-start; }

  .hud {
    width: 100%; max-width: 700px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px 0;
    flex-shrink: 0;
  }
  .hud-home-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .hud-home-btn:active { background: rgba(255,255,255,0.25); transform: scale(0.9); }

  /* Exit confirm overlay */
  #exitConfirm {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  #exitConfirm.visible { opacity: 1; pointer-events: all; }
  .exit-card {
    background: white;
    border-radius: 28px;
    padding: 36px 40px;
    text-align: center;
    max-width: 340px; width: 90%;
    animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .exit-card .exit-emoji { font-size: 60px; display: block; margin-bottom: 8px; }
  .exit-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 28px; color: #1E1B4B;
    margin-bottom: 6px;
  }
  .exit-card p { color: #666; font-size: 16px; font-weight: 700; margin-bottom: 24px; }
  .exit-btns { display: flex; gap: 12px; }
  .exit-btn-yes {
    flex: 1; padding: 14px;
    background: linear-gradient(135deg, var(--coral), #ff4444);
    color: white; font-family: 'Fredoka One', cursive;
    font-size: 20px; border: none; border-radius: 16px;
    cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    transition: all 0.1s;
  }
  .exit-btn-yes:active { transform: translateY(3px); box-shadow: none; }
  .exit-btn-no {
    flex: 1; padding: 14px;
    background: linear-gradient(135deg, var(--green), var(--teal));
    color: white; font-family: 'Fredoka One', cursive;
    font-size: 20px; border: none; border-radius: 16px;
    cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
    transition: all 0.1s;
  }
  .exit-btn-no:active { transform: translateY(3px); box-shadow: none; }
    font-family: 'Fredoka One', cursive;
    font-size: clamp(20px, 5vw, 28px);
    color: var(--yellow);
    display: flex; align-items: center; gap: 6px;
  }
  .hud-level {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(14px, 3.5vw, 18px);
    color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.1);
    padding: 6px 16px;
    border-radius: 50px;
  }
  .hud-lives { display: flex; gap: 4px; font-size: clamp(20px, 5vw, 26px); }

  .progress-bar-wrap {
    width: 100%; max-width: 700px;
    padding: 10px 20px;
    flex-shrink: 0;
  }
  .progress-bar {
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--blue));
    border-radius: 10px;
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(78,205,196,0.6);
  }

  .game-area {
    flex: 1; width: 100%; max-width: 700px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 10px 20px 20px;
    gap: 24px;
    overflow: hidden;
  }

  /* Question card */
  .question-card {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: clamp(20px, 5vw, 36px) clamp(24px, 6vw, 48px);
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .theme-emoji {
    font-size: clamp(50px, 12vw, 80px);
    display: block;
    margin-bottom: 8px;
    animation: bounce 1s ease-in-out infinite;
  }
  @keyframes bounce {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  .question-label {
    color: rgba(255,255,255,0.6);
    font-size: clamp(13px, 3vw, 16px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  /* Word display with blanks */
  .word-display {
    display: flex; gap: clamp(6px, 2vw, 12px);
    align-items: center; justify-content: center;
    flex-wrap: wrap;
    margin: 8px 0;
  }

  .letter-box {
    width: clamp(44px, 11vw, 70px);
    height: clamp(48px, 12vw, 76px);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(26px, 7vw, 46px);
    position: relative;
    transition: transform 0.2s;
  }
  .letter-box.filled {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .letter-box.blank {
    background: rgba(255,255,255,0.05);
    border: 3px dashed rgba(255,255,255,0.35);
    color: transparent;
    cursor: default;
  }
  .letter-box.blank.answer-placed {
    background: rgba(78,205,196,0.2);
    border: 3px solid var(--teal);
    color: var(--teal);
    animation: placePop 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .letter-box.correct-flash {
    animation: correctFlash 0.5s ease forwards;
  }
  .letter-box.wrong-flash {
    animation: wrongFlash 0.4s ease forwards;
  }
  @keyframes placePop {
    from { transform: scale(0.7); }
    to   { transform: scale(1); }
  }
  @keyframes correctFlash {
    0%   { background: rgba(74,222,128,0.3); border-color: var(--green); color: var(--green); transform: scale(1.1); }
    100% { background: rgba(74,222,128,0.15); transform: scale(1); }
  }
  @keyframes wrongFlash {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-8px); background: rgba(255,107,107,0.3); border-color: var(--coral); }
    75%     { transform: translateX(8px); }
  }

  /* Syllable boxes are wider */
  .syllable-box {
    min-width: clamp(60px, 16vw, 100px);
    height: clamp(48px, 12vw, 76px);
    padding: 0 10px;
    font-size: clamp(20px, 5vw, 32px);
    border-radius: 16px;
  }

  /* Options row */
  .options-grid {
    display: flex; gap: clamp(10px, 3vw, 16px);
    flex-wrap: wrap; justify-content: center;
    width: 100%;
  }

  .option-btn {
    min-width: clamp(50px, 12vw, 76px);
    height: clamp(50px, 12vw, 76px);
    border-radius: 16px;
    border: 3px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(22px, 6vw, 38px);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    box-shadow: 0 4px 0 rgba(0,0,0,0.25);
    padding: 0 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .option-btn:active, .option-btn.selected {
    transform: translateY(3px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.25);
    background: rgba(255,255,255,0.2);
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .option-btn.used {
    opacity: 0.3;
    pointer-events: none;
    transform: scale(0.9);
  }

  /* For build-word mode: target word display */
  .build-target {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(13px, 3.5vw, 18px);
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: -8px;
  }

  /* Action buttons */
  .action-row {
    display: flex; gap: 12px; width: 100%; justify-content: center;
  }
  .btn-check {
    background: linear-gradient(135deg, var(--green), var(--teal));
    color: var(--dark);
    font-family: 'Fredoka One', cursive;
    font-size: clamp(18px, 4.5vw, 24px);
    padding: 14px 40px;
    border: none; border-radius: 50px; cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.25);
    transition: all 0.1s;
    flex: 1; max-width: 260px;
  }
  .btn-check:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.25);
  }
  .btn-check:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-clear {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    font-family: 'Fredoka One', cursive;
    font-size: clamp(18px, 4.5vw, 24px);
    padding: 14px 24px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 50px; cursor: pointer;
    transition: all 0.1s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.2);
  }
  .btn-clear:active { transform: translateY(4px); box-shadow: none; }

  /* ====== FEEDBACK OVERLAY ====== */
  #feedback {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
  }
  .feedback-card {
    background: white;
    border-radius: 32px;
    padding: 40px 48px;
    text-align: center;
    max-width: 380px; width: 90%;
    animation: popIn 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  .feedback-emoji { font-size: 80px; display: block; margin-bottom: 12px; }
  .feedback-title {
    font-family: 'Fredoka One', cursive;
    font-size: 36px;
    margin-bottom: 8px;
  }
  .feedback-title.win  { color: var(--green); }
  .feedback-title.lose { color: var(--coral); }
  .feedback-sub { color: #666; font-size: 18px; font-weight: 700; margin-bottom: 24px; }
  .stars-row { font-size: 42px; margin-bottom: 24px; }

  /* ====== RESULT SCREEN ====== */
  #result { gap: 20px; }
  .result-card {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 40px;
    text-align: center;
    max-width: 460px; width: 100%;
    animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  .result-emoji { font-size: 90px; display: block; margin-bottom: 8px; }
  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(36px, 9vw, 56px);
    background: linear-gradient(135deg, var(--yellow), var(--coral));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-score {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(18px, 5vw, 26px);
    color: white; margin: 12px 0 8px;
  }
  .result-stars { font-size: 48px; }
  .result-next-btn {
    background: linear-gradient(135deg, var(--purple), var(--blue));
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(20px, 5vw, 26px);
    padding: 16px 48px;
    border: none; border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 6px 0 rgba(0,0,0,0.3);
    margin-top: 8px;
    transition: all 0.1s;
  }
  .result-next-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }

  /* Floating particles */
  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 28px;
    animation: particleFly 1.2s ease-out forwards;
    z-index: 100;
  }
  @keyframes particleFly {
    from { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    to   { opacity: 0; transform: translateY(-200px) rotate(360deg) scale(0.3); }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 12px; height: 12px;
    pointer-events: none;
    z-index: 100;
    animation: confettiFall 2s ease-in forwards;
  }
  @keyframes confettiFall {
    from { opacity: 1; transform: translateY(-50px) rotate(0deg); }
    to   { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  /* Shake animation for the card */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%,60% { transform: translateX(-12px); }
    40%,80% { transform: translateX(12px); }
  }
  .shake { animation: shake 0.4s ease; }

  .mode-choose { background: rgba(251,146,60,0.3); color: #FED7AA; border: 1px solid rgba(251,146,60,0.4); }

  /* Phase 4 choose-word options */
  .choose-grid {
    display: flex; flex-direction: column; gap: clamp(10px, 2.5vw, 16px);
    width: 100%;
  }
  .choose-btn {
    width: 100%;
    padding: clamp(16px, 4vw, 22px) 20px;
    border-radius: 20px;
    border: 3px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: white;
    font-family: 'Fredoka One', cursive;
    font-size: clamp(22px, 6vw, 34px);
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 5px 0 rgba(0,0,0,0.25);
    text-align: center;
    letter-spacing: 2px;
  }
  .choose-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
  .choose-btn.correct-choice {
    background: rgba(74,222,128,0.3);
    border-color: var(--green);
    color: var(--green);
    animation: correctFlash 0.5s ease forwards;
  }
  .choose-btn.wrong-choice {
    background: rgba(255,107,107,0.25);
    border-color: var(--coral);
    color: var(--coral);
    pointer-events: none;
    animation: wrongFlash 0.4s ease forwards;
  }
  .choose-btn.disabled { pointer-events: none; opacity: 0.4; }
    display: inline-block;
    font-size: clamp(11px, 2.5vw, 13px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 50px;
    margin-bottom: 10px;
  }
  .mode-letter  { background: rgba(168,85,247,0.3); color: #E879F9; border: 1px solid rgba(168,85,247,0.4); }
  .mode-syllable{ background: rgba(96,165,250,0.3); color: #93C5FD; border: 1px solid rgba(96,165,250,0.4); }
  .mode-build   { background: rgba(74,222,128,0.3); color: #86EFAC; border: 1px solid rgba(74,222,128,0.4); }

  /* Home best score */
  .best-score {
    color: rgba(255,255,255,0.5);
    font-size: 15px;
    font-weight: 700;
    animation: popIn 0.6s 0.7s cubic-bezier(.34,1.56,.64,1) both;
  }
  .best-score span { color: var(--yellow); }
</style>
</head>
<body>

<!-- Background elements -->
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="star-field" id="starField"></div>

<!-- ===== HOME SCREEN ===== -->
<div class="screen" id="home">
  <div class="logo-wrap">
    <span class="logo-emoji">🌟</span>
    <div class="logo-title">Letrinha</div>
    <div class="logo-sub">aprenda brincando!</div>
  </div>
  <button class="btn-primary" onclick="startGame()">▶ JOGAR!</button>
  <div class="phase-select">
    <button class="phase-btn active" onclick="selectPhase(this,1)">🌱 Fase 1</button>
    <button class="phase-btn" onclick="selectPhase(this,2)">🌿 Fase 2</button>
    <button class="phase-btn" onclick="selectPhase(this,3)">🌳 Fase 3</button>
    <button class="phase-btn" onclick="selectPhase(this,4)">🌟 Fase 4</button>
  </div>
  <div class="best-score" id="bestScoreDisplay">Melhor pontuação: <span>0</span> ⭐</div>
</div>

function startGame() {
  const phaseData = PHASES[currentPhase];
  shuffledWords = shuffle([...phaseData.words]).slice(0, phaseData.questions);
  score = 0; lives = 3; currentQ = 0;
  showScreen('game');
  loadQuestion();
}

function loadQuestion() {
  const phaseData = PHASES[currentPhase];
  if(currentQ >= phaseData.questions || lives <= 0) {
    showResult(); return;
  }

  currentData = shuffledWords[currentQ];
  answers = [];
  blanks  = [];
  blankIdxs = [];

  // Reset UI
  document.querySelector('.action-row').style.display = 'flex';
  document.getElementById('optionsGrid').className = 'options-grid';

  // Pick mode
  const modes = phaseData.modes;
  currentMode = modes[Math.floor(Math.random()*modes.length)];

  // Update HUD
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('levelDisplay').textContent =
    `${phaseData.name.split('·')[0].trim()} · Q${currentQ+1}/${phaseData.questions}`;
  updateLives();
  const pct = (currentQ/phaseData.questions)*100;
  document.getElementById('progressFill').style.width = pct+'%';

  // Emoji + hint
  document.getElementById('themeEmoji').textContent = currentData.emoji;
  document.getElementById('questionLabel').textContent = currentMode === 'choose'
    ? (currentData.hint || 'What is this?')
    : currentData.hint;

  // Mode tag
  const modeTag = document.getElementById('modeTag');
  const buildTarget = document.getElementById('buildTarget');
  buildTarget.classList.add('hidden');

  if(currentMode === 'letter') {
    modeTag.className = 'mode-tag mode-letter';
    modeTag.textContent = '🔤 Letra que falta';
    buildLetterMode();
  } else if(currentMode === 'syllable') {
    modeTag.className = 'mode-tag mode-syllable';
    modeTag.textContent = '✏️ Sílaba que falta';
    buildSyllableMode();
  } else if(currentMode === 'choose') {
    modeTag.className = 'mode-tag mode-choose';
    modeTag.textContent = '👀 Qual é a palavra?';
    buildChooseMode();
  } else {
    modeTag.className = 'mode-tag mode-build';
    modeTag.textContent = '🔀 Monte a palavra';
    buildBuildMode();
  }

  document.getElementById('checkBtn').disabled = true;
}

// ---- LETTER MODE ----
function buildLetterMode() {
  const word = currentData.word;
  // How many blanks? Phase-based
  const numBlanks = currentPhase === 1 ? 1 : currentPhase === 2 ? 2 : 3;
  const available = [];
  for(let i=0;i<word.length;i++) available.push(i);
  blankIdxs = shuffle(available).slice(0, Math.min(numBlanks, word.length-1)).sort((a,b)=>a-b);
  answers = new Array(blankIdxs.length).fill('');

  // Word display
  const wd = document.getElementById('wordDisplay');
  wd.innerHTML = '';
  for(let i=0;i<word.length;i++){
    const box = document.createElement('div');
    box.className = blankIdxs.includes(i) ? 'letter-box blank' : 'letter-box filled';
    box.textContent = blankIdxs.includes(i) ? '' : word[i];
    if(blankIdxs.includes(i)){
      box.dataset.blankOrder = blankIdxs.indexOf(i);
      box.id = 'blank_'+blankIdxs.indexOf(i);
    }
    wd.appendChild(box);
  }

  // Generate options: correct letters + distractors
  const correctLetters = blankIdxs.map(i=>word[i]);
  const distractors = generateLetterDistractors(correctLetters, word);
  const allOptions = shuffle([...correctLetters, ...distractors]);

  renderOptions(allOptions, 'letter');
}

function generateLetterDistractors(correct, word) {
  const used = new Set([...correct, ...word.split('')]);
  const pool = 'ABCDEFGHIJKLMNOPRSTUVZ'.split('').filter(l=>!used.has(l));
  const count = Math.min(4, pool.length);
  return shuffle(pool).slice(0, count);
}

// ---- SYLLABLE MODE ----
function buildSyllableMode() {
  const word = currentData.word;
  const sylls = SYLLABLE_MAP[word] || splitSyllablesFallback(word);
  if(sylls.length < 2) { currentMode='letter'; buildLetterMode(); return; }

  // Pick 1 blank syllable slot
  const blankPos = Math.floor(Math.random()*sylls.length);
  blankIdxs = [blankPos];
  answers = [''];
  blanks = [sylls[blankPos]];

  const wd = document.getElementById('wordDisplay');
  wd.innerHTML = '';
  for(let i=0;i<sylls.length;i++){
    const box = document.createElement('div');
    box.className = (i===blankPos) ? 'letter-box syllable-box blank' : 'letter-box syllable-box filled';
    box.textContent = (i===blankPos) ? '' : sylls[i];
    if(i===blankPos) { box.id='blank_0'; box.dataset.blankOrder=0; }
    wd.appendChild(box);
  }

  // Options: correct syllable + distractors
  const distractors = generateSyllableDistractors(sylls[blankPos], sylls, word);
  const allOptions = shuffle([sylls[blankPos], ...distractors]);
  renderOptions(allOptions, 'syllable');
}

function generateSyllableDistractors(correct, sylls, word) {
  // Pull from other words' syllables
  const allSylls = Object.values(SYLLABLE_MAP).flat().filter(s=>s!==correct && !sylls.includes(s));
  return shuffle(allSylls).slice(0,3);
}

function splitSyllablesFallback(word) {
  // Simple: split into pairs
  const parts = [];
  for(let i=0;i<word.length;i+=2) parts.push(word.slice(i,i+2));
  return parts;
}

// ---- CHOOSE MODE (Fase 4) ----
function buildChooseMode() {
  document.getElementById('wordDisplay').innerHTML = '';
  document.getElementById('optionsGrid').innerHTML = '';
  document.querySelector('.action-row').style.display = 'none';

  // Pick 2 wrong options from the same phase pool (using English)
  const pool = PHASES[4].words.filter(w => w.eng !== currentData.eng);
  const wrongs = shuffle([...pool]).slice(0, 2).map(w => w.eng);
  const options = shuffle([currentData.eng, ...wrongs]);

  const grid = document.getElementById('optionsGrid');
  grid.className = 'choose-grid';

  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'choose-btn';
    btn.textContent = opt;
    btn.onclick = () => pickChooseOption(btn, opt);
    grid.appendChild(btn);
  });
}

function pickChooseOption(btn, value) {
  document.querySelectorAll('.choose-btn').forEach(b => b.classList.add('disabled'));

  const correct = value === currentData.eng;
  btn.classList.remove('disabled');
  btn.classList.add(correct ? 'correct-choice' : 'wrong-choice');

  if(!correct) {
    document.querySelectorAll('.choose-btn').forEach(b => {
      if(b.textContent === currentData.eng) b.classList.add('correct-choice');
    });
    lives--;
    updateLives();
  }

  const pts = 8;
  if(correct) {
    score += pts;
    spawnParticles(true);
  }

  setTimeout(() => {
    showFeedback(correct, pts, lives <= 0 && !correct);
  }, 700);
}

// ---- BUILD MODE ----
function buildBuildMode() {
  const word = currentData.word;
  const sylls = SYLLABLE_MAP[word] || splitSyllablesFallback(word);

  // All syllables are blanks; options are shuffled syllables
  blankIdxs = sylls.map((_,i)=>i);
  answers = new Array(sylls.length).fill('');
  blanks  = [...sylls];

  const buildTarget = document.getElementById('buildTarget');
  buildTarget.classList.add('hidden');

  const wd = document.getElementById('wordDisplay');
  wd.innerHTML = '';
  for(let i=0;i<sylls.length;i++){
    const box = document.createElement('div');
    box.className = 'letter-box syllable-box blank';
    box.id = 'blank_'+i;
    box.dataset.blankOrder = i;
    wd.appendChild(box);
  }

  const shuffledSylls = shuffle([...sylls]);
  renderOptions(shuffledSylls, 'build');
}

// ---- RENDER OPTIONS ----
function renderOptions(options, mode) {
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  options.forEach((opt, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = opt;
    btn.dataset.value = opt;
    btn.dataset.idx = idx;
    btn.onclick = () => pickOption(btn, mode);
    grid.appendChild(btn);
  });
}

// ---- PICK OPTION ----
function pickOption(btn, mode) {
  if(btn.classList.contains('used')) return;

  const value = btn.dataset.value;

  if(mode === 'build' || mode === 'letter') {
    // Fill next empty slot sequentially
    const nextEmpty = answers.findIndex(a=>a==='');
    if(nextEmpty === -1) return;
    answers[nextEmpty] = value;
    updateBlankDisplay(nextEmpty, value);
    btn.classList.add('used');
  } else {
    // Syllable mode: single blank, allow swap
    if(answers[0] !== '') {
      // Clear previous selection
      const prev = document.querySelector('.option-btn.selected');
      if(prev) { prev.classList.remove('selected','used'); }
    }
    answers[0] = value;
    updateBlankDisplay(0, value);
    document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  // Enable check if all blanks filled
  const allFilled = answers.every(a=>a!=='');
  document.getElementById('checkBtn').disabled = !allFilled;
}

function updateBlankDisplay(idx, value) {
  const box = document.getElementById('blank_'+idx);
  if(!box) return;
  box.textContent = value;
  box.classList.add('answer-placed');
}

function clearAnswers() {
  answers = new Array(answers.length).fill('');
  const blanksEls = document.querySelectorAll('.letter-box.blank');
  blanksEls.forEach(b=>{ b.textContent=''; b.classList.remove('answer-placed'); });
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('used','selected'));
  document.getElementById('checkBtn').disabled = true;
}

// ---- CHECK ----
function checkAnswer() {
  const word = currentData.word;
  let correct = false;

  if(currentMode === 'letter') {
    correct = blankIdxs.every((pos,i) => answers[i] === word[pos]);
  } else if(currentMode === 'syllable') {
    const sylls = SYLLABLE_MAP[word] || splitSyllablesFallback(word);
    correct = answers[0] === sylls[blankIdxs[0]];
  } else {
    // build: reconstruct and check
    const sylls = SYLLABLE_MAP[word] || splitSyllablesFallback(word);
    correct = answers.join('') === sylls.join('');
  }

  if(correct) {
    onCorrect();
  } else {
    onWrong();
  }
}

function onCorrect() {
  // Flash correct
  document.querySelectorAll('.letter-box.blank').forEach(b=>{
    b.classList.add('correct-flash');
  });

  const pts = 5 + (currentPhase-1)*3;
  score += pts;
  spawnParticles(true);

  setTimeout(()=>{
    showFeedback(true, pts);
  }, 400);
}

function onWrong() {
  lives--;
  updateLives();
  document.querySelectorAll('.letter-box.blank').forEach(b=>b.classList.add('wrong-flash'));
  const card = document.getElementById('questionCard');
  card.classList.add('shake');
  setTimeout(()=>{
    card.classList.remove('shake');
    document.querySelectorAll('.letter-box.blank').forEach(b=>b.classList.remove('wrong-flash'));
  }, 500);

  if(lives <= 0) {
    setTimeout(()=>{ showFeedback(false, 0, true); }, 400);
  } else {
    clearAnswers();
  }
}

function updateLives() {
  const el = document.getElementById('livesDisplay');
  el.textContent = '❤️'.repeat(Math.max(0,lives)) + '🖤'.repeat(Math.max(0,3-lives));
}

// ---- FEEDBACK ----
function showFeedback(correct, pts, gameOver=false) {
  const emoji = correct
    ? EMOJIS_CORRECT[Math.floor(Math.random()*EMOJIS_CORRECT.length)]
    : (gameOver ? '😔' : EMOJIS_WRONG[Math.floor(Math.random()*EMOJIS_WRONG.length)]);
  const msg = correct
    ? MSGS_CORRECT[Math.floor(Math.random()*MSGS_CORRECT.length)]
    : (gameOver ? 'Acabaram as vidas!' : MSGS_WRONG[Math.floor(Math.random()*MSGS_WRONG.length)]);

  document.getElementById('feedbackEmoji').textContent = emoji;
  const titleEl = document.getElementById('feedbackTitle');
  titleEl.textContent = correct ? 'Acertou! 🎉' : (gameOver ? 'Fim de jogo!' : 'Quase!');
  titleEl.className = 'feedback-title '+(correct?'win':'lose');
  document.getElementById('feedbackSub').textContent = correct ? `+${pts} pontos! ${msg}` : msg;

  const starsEl = document.getElementById('feedbackStars');
  starsEl.textContent = correct ? '⭐'.repeat(Math.min(3,currentPhase)) : '';

  if(correct && !gameOver) spawnConfetti();
  showScreen('feedback');
}

function nextQuestion() {
  currentQ++;
  showScreen('game');
  loadQuestion();
}

// ---- RESULT ----
function showResult() {
  const best = parseInt(localStorage.getItem('letrinha_best')||'0');
  if(score > best) localStorage.setItem('letrinha_best', score);

  const pct = score / (PHASES[currentPhase].questions * (5+(currentPhase-1)*3));
  const stars = pct >= 0.8 ? '⭐⭐⭐' : pct >= 0.5 ? '⭐⭐' : '⭐';
  const emoji = pct >= 0.8 ? '🏆' : pct >= 0.5 ? '🎉' : '💪';
  const title = pct >= 0.8 ? 'Incrível!' : pct >= 0.5 ? 'Muito bem!' : 'Continue tentando!';

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = `Você fez ${score} pontos!`;
  document.getElementById('resultStars').textContent = stars;

  spawnConfetti();
  showScreen('result');
  updateBestScore();
}

function goHome() {
  showScreen('home');
  updateBestScore();
}

// ---- PARTICLES ----
function spawnParticles(correct) {
  const emojis = correct ? ['⭐','✨','💫','🌟'] : ['💧','😅'];
  for(let i=0;i<6;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left = (30+Math.random()*40)+'%';
    p.style.top  = (40+Math.random()*20)+'%';
    p.style.animationDelay = Math.random()*0.4+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 1500);
  }
}

function spawnConfetti() {
  const colors = ['#FF6B6B','#FFE66D','#4ECDC4','#A855F7','#60A5FA','#4ADE80','#FB923C'];
  for(let i=0;i<30;i++){
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.left = Math.random()*100+'%';
    c.style.top  = '-20px';
    c.style.borderRadius = Math.random()>0.5?'50%':'3px';
    c.style.animationDelay = Math.random()*0.8+'s';
    c.style.animationDuration = (1.5+Math.random())+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 2800);
  }
}

// ---- SCREEN MANAGEMENT ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>{
    s.classList.toggle('hidden', s.id !== id);
  });
}

// ---- UTILS ----
function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function confirmExit() {
  document.getElementById('exitConfirm').classList.add('visible');
}
function closeExit() {
  document.getElementById('exitConfirm').classList.remove('visible');
}
function doExit() {
  document.getElementById('exitConfirm').classList.remove('visible');
  goHome();
}

// Init
init();
</script>
